name: Update source.json

on:
  repository_dispatch:
    types: [new-release]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update source.json
        env:
          APP_ID: ${{ github.event.client_payload.app_id }}
          VERSION: ${{ github.event.client_payload.version }}
          DATE: ${{ github.event.client_payload.date }}
          DOWNLOAD_URL: ${{ github.event.client_payload.download_url }}
          SIZE: ${{ github.event.client_payload.size }}
          DESCRIPTION: ${{ github.event.client_payload.description }}
        run: |
          python3 .github/scripts/update_source.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source.json
          git diff --staged --quiet || git commit -m "chore: update ${{ github.event.client_payload.app_id }} to v${{ github.event.client_payload.version }}"
          git push
